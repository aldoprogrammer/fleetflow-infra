services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleetflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleetflow_local_secret}
      POSTGRES_DB: ${POSTGRES_DB:-fleetflow}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - fleetflow_postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-fleetflow} -d ${POSTGRES_DB:-fleetflow}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - fleetflow-net

  redis:
    image: redis:7-alpine
    container_name: fleetflow-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - fleetflow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - fleetflow-net
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - noeviction

  fleetflow-api:
    build:
      context: ..
      dockerfile: fleetflow-api/Dockerfile
    container_name: fleetflow-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-fleetflow}:${POSTGRES_PASSWORD:-fleetflow_local_secret}@postgres:5432/${POSTGRES_DB:-fleetflow}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET:-super_secret_fleetflow_jwt_key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/v1/health/live || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - fleetflow-net

networks:
  fleetflow-net:
    driver: bridge
    name: fleetflow-net

volumes:
  fleetflow_postgres_data:
    name: fleetflow_postgres_data
    driver: local
  fleetflow_redis_data:
    name: fleetflow_redis_data
    driver: local
